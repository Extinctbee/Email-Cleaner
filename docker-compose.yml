

services:
  # Service 1: Our PostgreSQL Database Container
  db:
    image: postgres:15
    container_name: email_cleaner_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecretpassword123
      POSTGRES_DB: email_cleaner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  

